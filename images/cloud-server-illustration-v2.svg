<svg width="680" height="520" viewBox="0 0 680 520" xmlns="http://www.w3.org/2000/svg">
<title>Isometric cloud server stack illustration with extending nodes</title>
<desc>A complete isometric illustration of three stacked server blocks rising on a platform, connected by a flowing line to a teal cloud shape above, with satellite nodes reaching toward the left edge, rendered in layered earthy jewel tones</desc>

<rect x="0" y="0" width="680" height="520" fill="#f7f2ea"/>

<g opacity="0.4">
<circle cx="40" cy="60" r="2" fill="#c9ad87"/>
<circle cx="100" cy="40" r="2" fill="#c9ad87"/>
<circle cx="610" cy="80" r="2" fill="#c9ad87"/>
<circle cx="600" cy="460" r="2" fill="#c9ad87"/>
<circle cx="40" cy="460" r="2" fill="#c9ad87"/>
<circle cx="20" cy="220" r="2" fill="#c9ad87"/>
<circle cx="620" cy="260" r="2" fill="#c9ad87"/>
</g>

<defs>
<marker id="archArrow" viewBox="0 0 10 10" refX="7" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
<path d="M2 1L8 5L2 9" fill="none" stroke="#28211a" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- ground shadow -->
<ellipse cx="340" cy="445" rx="150" ry="22" fill="#28211a" opacity="0.06"/>

<!-- platform -->
<g transform="translate(340,430)">
<path d="M -150 0 L 0 -75 L 150 0 L 0 75 Z" fill="#ddd0bc" opacity="0.55"/>
<path d="M -150 0 L 0 -75 L 150 0 L 0 75 Z" fill="none" stroke="#c4b49a" stroke-width="0.75" opacity="0.7"/>
<path d="M -150 0 L 0 75 L 0 85 L -150 10 Z" fill="#c4b49a" opacity="0.35"/>
<path d="M 150 0 L 0 75 L 0 85 L 150 10 Z" fill="#b8a78c" opacity="0.4"/>
</g>

<!-- server stack -->
<g transform="translate(340,375)">

<g transform="translate(-65,15)">
<path d="M -42 0 L 0 -21 L 42 0 L 42 32 L 0 53 L -42 32 Z" fill="#a0624a"/>
<path d="M 0 -21 L 42 0 L 42 32 L 0 53 Z" fill="#7a4733"/>
<path d="M -42 0 L 0 -21 L 0 53 L -42 32 Z" fill="#b97558"/>
<line x1="-33" y1="7" x2="-33" y2="26" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<line x1="-24" y1="11" x2="-24" y2="30" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<circle cx="29" cy="10" r="2.2" fill="#f0d9c8" opacity="0.9"/>
<circle cx="22" cy="14" r="1.4" fill="#f0d9c8" opacity="0.6"/>
</g>

<g transform="translate(35,-22)">
<path d="M -42 0 L 0 -21 L 42 0 L 42 32 L 0 53 L -42 32 Z" fill="#6b7c5c"/>
<path d="M 0 -21 L 42 0 L 42 32 L 0 53 Z" fill="#4a5640"/>
<path d="M -42 0 L 0 -21 L 0 53 L -42 32 Z" fill="#80926a"/>
<line x1="-33" y1="7" x2="-33" y2="26" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<line x1="-24" y1="11" x2="-24" y2="30" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<circle cx="29" cy="10" r="2.2" fill="#e3ecd8" opacity="0.9"/>
<circle cx="22" cy="14" r="1.4" fill="#e3ecd8" opacity="0.6"/>
</g>

<g transform="translate(-15,-58)">
<path d="M -42 0 L 0 -21 L 42 0 L 42 32 L 0 53 L -42 32 Z" fill="#b8893f"/>
<path d="M 0 -21 L 42 0 L 42 32 L 0 53 Z" fill="#8e6628"/>
<path d="M -42 0 L 0 -21 L 0 53 L -42 32 Z" fill="#cb9f5c"/>
<line x1="-33" y1="7" x2="-33" y2="26" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<line x1="-24" y1="11" x2="-24" y2="30" stroke="#f7f2ea" stroke-width="1.6" opacity="0.55"/>
<circle cx="29" cy="10" r="2.2" fill="#f3e3c4" opacity="0.9"/>
<circle cx="22" cy="14" r="1.4" fill="#f3e3c4" opacity="0.6"/>
</g>

</g>

<!-- connecting line stack to cloud -->
<path d="M 325 270 C 320 230 320 200 330 170" fill="none" stroke="#28211a" stroke-width="1" stroke-linecap="round" opacity="0.55" marker-end="url(#archArrow)"/>

<!-- cloud -->
<g transform="translate(345,125)">
<path d="M -100 26
         C -122 26 -130 1 -109 -8
         C -111 -36 -78 -48 -53 -32
         C -44 -55 -7 -57 4 -34
         C 33 -42 62 -21 53 6
         C 80 8 82 35 54 39
         L -92 39
         C -109 39 -116 29 -100 26 Z"
fill="#1f5f54"/>
<path d="M -100 26
         C -122 26 -130 1 -109 -8
         C -111 -36 -78 -48 -53 -32
         C -44 -55 -7 -57 4 -34
         C 33 -42 62 -21 53 6
         C 80 8 82 35 54 39
         L -92 39
         C -109 39 -116 29 -100 26 Z"
fill="none" stroke="#143f38" stroke-width="0.75" opacity="0.55"/>
<circle cx="-42" cy="2" r="3" fill="#7fb8ac" opacity="0.85"/>
<circle cx="-12" cy="-8" r="2.2" fill="#7fb8ac" opacity="0.65"/>
<circle cx="20" cy="2" r="1.8" fill="#7fb8ac" opacity="0.55"/>
</g>

<!-- satellite nodes, pulled toward left edge -->
<circle cx="60" cy="160" r="5" fill="#7a3b3b"/>
<line x1="65" y1="160" x2="245" y2="125" stroke="#7a3b3b" stroke-width="0.75" opacity="0.45"/>

<circle cx="550" cy="200" r="5" fill="#b8893f"/>
<line x1="546" y1="200" x2="450" y2="150" stroke="#b8893f" stroke-width="0.75" opacity="0.5"/>

<circle cx="35" cy="300" r="4" fill="#6b7c5c"/>
<line x1="40" y1="300" x2="200" y2="365" stroke="#6b7c5c" stroke-width="0.75" opacity="0.4"/>

<circle cx="585" cy="350" r="4" fill="#a0624a"/>
<line x1="580" y1="350" x2="490" y2="385" stroke="#a0624a" stroke-width="0.75" opacity="0.45"/>

<circle cx="20" cy="395" r="3.5" fill="#1f5f54"/>
<line x1="25" y1="393" x2="190" y2="395" stroke="#1f5f54" stroke-width="0.75" opacity="0.35"/>

</svg>
